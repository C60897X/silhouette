<!DOCTYPE html>
<head>
    <title>IP Capstone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/section-01-intro.css">
    <link rel="stylesheet" href="./styles/base.css">
</head>
<body>
    <main>
        <section id="section-01-intro" class="story-section">
            <div class="intro-frame" id="intro-cat-frame">
                <div id="intro-text-stage" class="intro-text-stage">
                    <div class="intro-notebook-lines" aria-hidden="true"></div>

                    <div class="intro-text-block">
                        <div class="intro-line intro-line-1">
                            <span class="intro-text-line-1a-slot">
                                <span id="intro-text-line-1a" class="intro-text-segment intro-write" data-text="This is">
                                    <span class="intro-text-ghost">This is</span>
                                    <span class="intro-text-typed" aria-hidden="true"></span>
                                </span>
                            </span>

                            <button id="intro-cat-hitbox" class="intro-cat-hitbox" aria-label="Reveal Coco name">
                                <img id="intro-inline-cat-image" class="intro-inline-cat-image" src="./assets/intro/start-intro-cat.png" alt="Coco">
                            </button>

                            <span id="intro-text-line-1b" class="intro-text-segment intro-write" data-text="Our story dates back to 12 years ago.">
                                <span class="intro-text-ghost">Our story dates back to 12 years ago.</span>
                                <span class="intro-text-typed" aria-hidden="true"></span>
                            </span>
                        </div>

                        <div class="intro-line intro-line-2">
                            <span id="intro-text-line-2" class="intro-text-segment intro-write" data-text="From the moment I saw her, I knew she would become a member of our family.">
                                <span class="intro-text-ghost">From the moment I saw her, I knew she would become a member of our family.</span>
                                <span class="intro-text-typed" aria-hidden="true"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <div id="intro-hover-cursor" class="intro-hover-cursor" aria-hidden="true">
                    <img id="intro-hover-paw" class="intro-hover-paw" src="./assets/shared/objects/mouse-icon-paw-dark-32.png" alt="">
                    <div id="intro-hover-enter" class="intro-hover-enter">Enter</div>
                </div>

                <div id="intro-memory-scenes" class="intro-memory-scenes">
                    <div id="intro-memory-text-stage" class="intro-memory-text-stage">
                        <div id="intro-memory-text" class="intro-memory-text" data-text="">
                            <span id="intro-memory-text-ghost" class="intro-memory-text-ghost"></span>
                            <span id="intro-memory-text-typed" class="intro-memory-text-typed" aria-hidden="true"></span>
                        </div>
                        <div class="intro-memory-text-line" aria-hidden="true"></div>
                    </div>

                    <button id="intro-photo-button" class="intro-photo-button" aria-label="Take photo">
                        <img src="./assets/intro/intro-memory-scenes-6-photo-button.png" alt="Take photo">
                    </button>

                    <div id="intro-memory-progress" class="intro-memory-progress" aria-hidden="true">
                        <div id="intro-memory-progress-fill" class="intro-memory-progress-fill"></div>
                    </div>

                    <div id="intro-memory-track" class="intro-memory-track">
                        <img class="intro-memory-image" src="./assets/intro/intro-memory-scenes-1.png" alt="Memory scene 1">
                        <img class="intro-memory-image" src="./assets/intro/intro-memory-scenes-2.png" alt="Memory scene 2">
                        <img class="intro-memory-image" src="./assets/intro/intro-memory-scenes-3.png" alt="Memory scene 3">
                        <img class="intro-memory-image" src="./assets/intro/intro-memory-scenes-4.png" alt="Memory scene 4">
                        <img class="intro-memory-image" src="./assets/intro/intro-memory-scenes-5.png" alt="Memory scene 5">
                        <img class="intro-memory-image" src="./assets/intro/intro-memory-scenes-6.png" alt="Memory scene 6">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="./scripts/main.js"></script>
</body>
